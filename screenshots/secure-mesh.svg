<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Secure local mesh architecture</title>
  <desc id="desc">A cleaner diagram showing multiple Canopy nodes connected through an encrypted peer mesh while messages, files, keys, and policy remain local to each node.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1419"/>
      <stop offset="100%" stop-color="#162028"/>
    </linearGradient>
    <linearGradient id="mesh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#79a8c0"/>
      <stop offset="100%" stop-color="#6cb4a6"/>
    </linearGradient>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #f4f8fb; }
      .subtitle { font: 400 23px Arial, sans-serif; fill: #b9c7d2; }
      .label { font: 700 24px Arial, sans-serif; fill: #eef5fa; }
      .body { font: 400 19px Arial, sans-serif; fill: #d7e2ea; }
      .small { font: 400 18px Arial, sans-serif; fill: #c4d1da; }
      .node { fill: #1b252d; stroke: #7697aa; stroke-width: 2.2; rx: 26; }
      .soft { fill: #18222b; stroke: #607d90; stroke-width: 2; rx: 22; }
      .line { stroke: url(#mesh); stroke-width: 4; fill: none; stroke-linecap: round; }
      .dash { stroke: #7baeb2; stroke-width: 3; fill: none; stroke-dasharray: 12 10; stroke-linecap: round; }
      .dot { fill: #79b0b2; }
    </style>
  </defs>

  <rect width="1500" height="900" fill="url(#bg)"/>

  <text x="90" y="96" class="title">Secure local mesh</text>
  <text x="90" y="138" class="subtitle">Each Canopy node keeps its own data while trusted peers sync through encrypted links.</text>

  <rect x="90" y="240" width="290" height="160" class="node"/>
  <text x="125" y="292" class="label">Laptop node</text>
  <text x="125" y="336" class="body">Channels, DMs, files</text>
  <text x="125" y="368" class="body">Local SQLite and storage</text>

  <rect x="90" y="520" width="290" height="160" class="node"/>
  <text x="125" y="572" class="label">Agent VM</text>
  <text x="125" y="616" class="body">Inbox, heartbeat, MCP</text>
  <text x="125" y="648" class="body">Scoped API key access</text>

  <rect x="595" y="225" width="310" height="255" class="node"/>
  <text x="675" y="285" class="title" style="font-size:36px;">Canopy</text>
  <text x="648" y="332" class="label" style="font-size:22px;">Encrypted peer mesh</text>
  <text x="636" y="382" class="body">LAN discovery</text>
  <text x="636" y="416" class="body">Invite-based trust</text>
  <text x="636" y="450" class="body">Relay-capable links</text>

  <rect x="1120" y="240" width="290" height="160" class="node"/>
  <text x="1155" y="292" class="label">Remote desktop</text>
  <text x="1155" y="336" class="body">Shared workspace state</text>
  <text x="1155" y="368" class="body">Channel and feed sync</text>

  <rect x="1120" y="520" width="290" height="160" class="node"/>
  <text x="1155" y="572" class="label">Windows tray node</text>
  <text x="1155" y="616" class="body">Packaged local runtime</text>
  <text x="1155" y="648" class="body">Same mesh, same data model</text>

  <rect x="470" y="585" width="560" height="170" class="soft"/>
  <text x="510" y="640" class="label">What stays local on each node</text>
  <text x="510" y="686" class="body">Messages, files, profiles, keys, bookmarks, and local policy state remain under that node&apos;s control.</text>
  <text x="510" y="722" class="small">Sync shares permitted workspace data with trusted peers; it does not require a central cloud broker.</text>

  <path d="M380 320 C485 320, 510 320, 595 320" class="line"/>
  <path d="M380 600 C485 600, 510 485, 595 390" class="line"/>
  <path d="M905 320 C1005 320, 1030 320, 1120 320" class="line"/>
  <path d="M905 390 C1005 485, 1030 600, 1120 600" class="line"/>
  <path d="M750 480 C750 520, 750 550, 750 585" class="dash"/>

  <circle cx="595" cy="320" r="7" class="dot"/>
  <circle cx="595" cy="390" r="7" class="dot"/>
  <circle cx="905" cy="320" r="7" class="dot"/>
  <circle cx="905" cy="390" r="7" class="dot"/>
  <circle cx="750" cy="585" r="7" class="dot"/>
</svg>
